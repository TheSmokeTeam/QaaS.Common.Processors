name: CI

on:
  push:
    branches: ["**"]
    tags: ["*"]
  pull_request:

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release
  SOLUTION_PATH: QaaS.Common.Processors.sln
  PROJECT_TO_PACK: QaaS.Common.Processors/QaaS.Common.Processors.csproj
  PACKAGE_OUTPUT_DIRECTORY: ${{ github.workspace }}\BuildOutput

jobs:
  build-test-deploy:
    name: Build, Test & Deploy
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore packages
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build solution
        run: dotnet build ${{ env.SOLUTION_PATH }} --no-restore --configuration ${{ env.CONFIGURATION }}

      - name: Test solution
        run: dotnet test ${{ env.SOLUTION_PATH }} --configuration ${{ env.CONFIGURATION }} --no-restore --maxcpucount

      - name: Validate NuGet package metadata
        shell: powershell
        run: |
          $projectPath = "${{ env.PROJECT_TO_PACK }}"
          if (!(Test-Path $projectPath)) {
            throw "Project to pack not found: $projectPath"
          }

          [xml]$projectXml = Get-Content $projectPath

          $description = @($projectXml.Project.PropertyGroup | ForEach-Object { $_.Description } | Where-Object { $_ -and $_.Trim() -ne "" }) | Select-Object -First 1
          if ($null -eq $description) {
            Write-Host "No package description configured; README/snupkg validation skipped."
            exit 0
          }

          $packageReadmeFile = @($projectXml.Project.PropertyGroup | ForEach-Object { $_.PackageReadmeFile } | Where-Object { $_ -and $_.Trim() -ne "" }) | Select-Object -First 1
          $includeSymbols = @($projectXml.Project.PropertyGroup | ForEach-Object { $_.IncludeSymbols } | Where-Object { $_ -and $_.Trim() -ne "" }) | Select-Object -First 1
          $symbolPackageFormat = @($projectXml.Project.PropertyGroup | ForEach-Object { $_.SymbolPackageFormat } | Where-Object { $_ -and $_.Trim() -ne "" }) | Select-Object -First 1

          if ($packageReadmeFile -ne "README.md") {
            throw "PackageReadmeFile must be README.md for $projectPath"
          }

          if ($includeSymbols.ToString().ToLowerInvariant() -ne "true") {
            throw "IncludeSymbols must be true for $projectPath"
          }

          if ($symbolPackageFormat.ToString().ToLowerInvariant() -ne "snupkg") {
            throw "SymbolPackageFormat must be snupkg for $projectPath"
          }

          $hasReadmeItem = $false
          foreach ($itemGroup in @($projectXml.Project.ItemGroup)) {
            foreach ($noneItem in @($itemGroup.None)) {
              if ($null -eq $noneItem) {
                continue
              }

              if ($noneItem.Include -eq "..\README.md" -and
                  $noneItem.Pack.ToString().ToLowerInvariant() -eq "true" -and
                  $noneItem.PackagePath -eq "/" -and
                  $noneItem.Link -eq "README.md") {
                $hasReadmeItem = $true
              }
            }
          }

          if (-not $hasReadmeItem) {
            throw "Package must include root README.md as packed readme file for $projectPath"
          }

          Write-Host "NuGet package metadata validation passed for $projectPath."

      - name: Get Version
        if: startsWith(github.ref, 'refs/tags/')
        id: version
        uses: battila7/get-version-action@v2

      - name: Validate SemVer tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version-without-v }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta)\.[0-9]+)?$ ]]; then
            echo "Error: '$VERSION' is not a valid version."
            exit 1
          fi

      - name: Pack QaaS.Common.Processors
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          dotnet pack ${{ env.PROJECT_TO_PACK }} `
            --no-restore `
            --configuration ${{ env.CONFIGURATION }} `
            --include-symbols `
            -p:PackageVersion=${{ steps.version.outputs.version-without-v }} `
            --output ${{ env.PACKAGE_OUTPUT_DIRECTORY }}

      - name: Push QaaS.Common.Processors to NuGet
        if: startsWith(github.ref, 'refs/tags/')
        shell: powershell
        run: |
          $packages = Get-ChildItem "${{ env.PACKAGE_OUTPUT_DIRECTORY }}\QaaS.Common.Processors.*.nupkg"
          foreach ($package in $packages) {
            if ($package.Name -match "^QaaS\.Common\.Processors\.[0-9]") {
              dotnet nuget push $package.FullName -k ${{ secrets.NUGET_AUTH_TOKEN }} -s https://api.nuget.org/v3/index.json
            }
          }
